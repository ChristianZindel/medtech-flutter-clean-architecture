name: calm_check_in
description: "A calm daily check-in tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  fl_chart: ^1.1.1
  intl: ^0.20.2
  csv: ^7.1.0
  path_provider: ^2.1.4
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
